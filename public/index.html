    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
    <!DOCTYPE html>
<html lang="en">
  <head>
    <title>My Seasonal Glow - Inspo-Home-Cinematic</Inspo-Home></title>
    <script>
      const month = new Date().getMonth(); // 0 = Jan, 1 = Feb, ..., 11 = Dec
      let orbPath = 'autumn/ember-arc-orb.png'; // default

      if ([11, 0, 1].includes(month)) {
        orbPath = 'winter/silver-moon-orb.png'; // Dec–Feb
      } else if (month === 2) {
        orbPath = 'spring/blush-curtain-orb.png'; // March
      } else if ([5, 6, 7].includes(month)) {
        orbPath = 'summer/solar-flare-orb.png'; // Jun–Aug
      }

      const link = document.createElement('link');
      link.rel = 'icon';
      link.type = 'image/png';
      link.href = `/orbs/${orbPath}`;
      document.head.appendChild(link);
    </script>


  </head>

  <body class="mood-silhouette">
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
